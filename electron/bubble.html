<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 140px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 255, 0, 0.3);
            /* DEBUG GREEN BACKGROUND */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
            user-select: none;
            pointer-events: auto;
            /* Force clickable */
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            width: 24px;
            height: 24px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn:hover {
            background: rgba(239, 68, 68, 0.9);
            transform: scale(1.1);
        }

        .mode-btn {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .bubble-container {
            position: relative;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
        }

        .bubble {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #d946ef);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            -webkit-app-region: no-drag;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .bubble:hover {
            transform: scale(1.05);
        }

        .bubble:active {
            transform: scale(0.9);
            background: linear-gradient(135deg, #4f46e5, #c026d3);
        }

        .body-recording .bubble {
            animation: pulse-red 2s infinite;
            background: linear-gradient(135deg, #ef4444, #f59e0b);
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.2);
            z-index: 1;
        }

        .body-recording .wave {
            animation: wave 2s infinite;
        }

        @keyframes wave {
            from {
                transform: scale(1);
                opacity: 0.5;
            }

            to {
                transform: scale(2);
                opacity: 0;
            }
        }
    </style>
</head>

<body id="app-body">
    <div class="close-btn" id="close-btn">×</div>
    <div class="mode-btn" id="mode-btn">
        <div id="mode-icon-container"></div>
    </div>
    <div class="bubble-container" id="drag-container">
        <div class="wave"></div>
        <div class="bubble" id="main-bubble">
            <div id="icon-content"></div>
        </div>
    </div>
    <script>
        const { ipcRenderer } = require('electron');

        console.log('[Bubble] Script file initializing with direct ipcRenderer...');

        let isRecording = false;
        let currentMode = 'dictation';

        const bubble = document.getElementById('main-bubble');
        const modeBtn = document.getElementById('mode-btn');
        const closeBtn = document.getElementById('close-btn');

        function updateUI() {
            const body = document.getElementById('app-body');
            const iconContent = document.getElementById('icon-content');
            const modeIcon = document.getElementById('mode-icon-container');

            if (isRecording) {
                body.classList.add('body-recording');
                modeBtn.style.display = 'none';
                iconContent.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
            } else {
                body.classList.remove('body-recording');
                modeBtn.style.display = 'flex';
                if (currentMode === 'keyword') {
                    iconContent.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>';
                    modeIcon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
                } else {
                    iconContent.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
                    modeIcon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>';
                }
            }
        }

        bubble.addEventListener('mousedown', (e) => {
            console.log('[Bubble] MOUSEDOWN EVENT FIRED');
            e.preventDefault();

            // Visual feedback for click
            bubble.style.borderColor = 'white';
            bubble.style.transform = 'scale(0.9)';
            setTimeout(() => {
                bubble.style.borderColor = 'rgba(255, 255, 255, 0.3)';
                bubble.style.transform = 'scale(1)';
            }, 150);

            console.log('[Bubble] Sending trigger-toggle-recording via ipcRenderer');
            ipcRenderer.send('trigger-toggle-recording');
        });

        modeBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const next = currentMode === 'dictation' ? 'keyword' : 'dictation';
            ipcRenderer.invoke('set-typing-mode', next);
        });

        closeBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            ipcRenderer.invoke('hide-floating-button');
        });

        ipcRenderer.on('rec-state-change', (event, state) => {
            console.log('[Bubble] State changed:', state);
            isRecording = state;
            updateUI();
        });

        ipcRenderer.on('typing-mode-change', (event, mode) => {
            console.log('[Bubble] Mode changed:', mode);
            currentMode = mode;
            updateUI();
        });

        updateUI();

        // Request initial state
        setTimeout(() => {
            ipcRenderer.send('request-bubble-state');
        }, 500);

        let dragging = false;
        let startX, startY, winX, winY;
        document.body.addEventListener('mousedown', (e) => {
            if (e.target.closest('#main-bubble') || e.target.closest('#mode-btn') || e.target.closest('#close-btn')) return;
            dragging = true;
            startX = e.screenX; startY = e.screenY;
            ipcRenderer.invoke('get-floating-button-position').then(pos => {
                winX = pos.x; winY = pos.y;
            });
        });

        document.body.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const dx = e.screenX - startX;
            const dy = e.screenY - startY;
            ipcRenderer.invoke('set-floating-button-position', winX + dx, winY + dy);
        });

        document.body.addEventListener('mouseup', () => {
            if (dragging) {
                dragging = false;
                ipcRenderer.invoke('save-floating-button-position');
            }
        });
    </script>
</body>

</html>
