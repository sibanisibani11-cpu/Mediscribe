name: Build Cross-Platform Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            target_platform: win32
          - os: macos-latest
            platform: mac
            target_platform: darwin
          - os: ubuntu-latest
            platform: linux
            target_platform: linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate platform icons
        run: node scripts/generate-icons.js

      # NEXT_PUBLIC_* vars are inlined at build time by Next.js — they MUST be present
      # here as env vars. Writing them to .env later does NOT affect the frontend bundle.
      - name: Build web app (Next.js)
        shell: bash
        run: |
          if [[ -z "$NEXT_PUBLIC_FIREBASE_API_KEY" ]]; then
            echo "::error::NEXT_PUBLIC_FIREBASE_* repo secrets are not set. Without them the app ships in 'simulated mode' with per-machine (not per-user) licensing, letting any account on an activated machine use Pro for free. Add them in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          npm run build
        env:
          SKIP_ICON_GENERATION: 'true'
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      - name: Bundle models and binaries
        run: npm run prebuild
        env:
          TARGET_PLATFORM: ${{ matrix.target_platform }}
          SKIP_ICON_GENERATION: 'true'

      # Write .env AFTER next build so it is never overwritten by the prebuild lifecycle
      - name: Write .env file
        shell: bash
        run: |
          if [[ -z "${{ secrets.GOOGLE_CLIENT_ID }}" || -z "${{ secrets.GOOGLE_CLIENT_SECRET }}" ]]; then
            echo "::error::GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET repo secrets are not set — the built app would ship without Google Sync credentials. Add them in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s\n' \
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" \
            "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" \
            "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            > .env
          echo ".env written successfully."

      - name: Build Electron installers
        shell: bash
        run: |
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          [[ -n "${{ secrets.CSC_LINK }}" ]] && export CSC_LINK="${{ secrets.CSC_LINK }}"
          [[ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]] && export CSC_KEY_PASSWORD="${{ secrets.CSC_KEY_PASSWORD }}"
          [[ -n "${{ secrets.APPLE_ID }}" ]] && export APPLE_ID="${{ secrets.APPLE_ID }}"
          [[ -n "${{ secrets.APPLE_ID_PASSWORD }}" ]] && export APPLE_ID_PASSWORD="${{ secrets.APPLE_ID_PASSWORD }}"
          [[ -n "${{ secrets.APPLE_TEAM_ID }}" ]] && export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          [[ -n "${{ secrets.WIN_CSC_LINK }}" ]] && export WIN_CSC_LINK="${{ secrets.WIN_CSC_LINK }}"
          [[ -n "${{ secrets.WIN_CSC_KEY_PASSWORD }}" ]] && export WIN_CSC_KEY_PASSWORD="${{ secrets.WIN_CSC_KEY_PASSWORD }}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --${{ matrix.platform }} --publish=always
          else
            npx electron-builder --${{ matrix.platform }} --publish=never
          fi

      - name: Avoid storing large installer artifacts in GitHub Actions
        run: echo "Build complete. Installer artifacts are published to GitHub Releases for tag builds and not retained as workflow artifacts."

      - name: Upload Update Metadata
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: MediScribe-${{ matrix.platform }}-update-metadata
          path: |
            dist-electron/latest*.yml
            dist-electron/*.blockmap
          if-no-files-found: ignore
          compression-level: 6
          retention-days: 7

