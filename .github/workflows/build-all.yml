name: Build Cross-Platform Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            target_platform: win32
          - os: macos-latest
            platform: mac
            target_platform: darwin
          - os: ubuntu-latest
            platform: linux
            target_platform: linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Write runtime secrets to .env so the packaged app can read them
      - name: Write .env file
        shell: bash
        run: |
          printf '%s\n' \
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" \
            "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" \
            "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            > .env
          echo ".env written successfully."

      - name: Generate platform icons
        run: node scripts/generate-icons.js

      - name: Build web app (Next.js)
        run: npm run build

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      - name: Bundle models and binaries
        run: npm run prebuild
        env:
          TARGET_PLATFORM: ${{ matrix.target_platform }}
          SKIP_ICON_GENERATION: 'true'

      - name: Build Electron installers
        shell: bash
        run: |
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          [[ -n "${{ secrets.CSC_LINK }}" ]] && export CSC_LINK="${{ secrets.CSC_LINK }}"
          [[ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]] && export CSC_KEY_PASSWORD="${{ secrets.CSC_KEY_PASSWORD }}"
          [[ -n "${{ secrets.APPLE_ID }}" ]] && export APPLE_ID="${{ secrets.APPLE_ID }}"
          [[ -n "${{ secrets.APPLE_ID_PASSWORD }}" ]] && export APPLE_ID_PASSWORD="${{ secrets.APPLE_ID_PASSWORD }}"
          [[ -n "${{ secrets.APPLE_TEAM_ID }}" ]] && export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          [[ -n "${{ secrets.WIN_CSC_LINK }}" ]] && export WIN_CSC_LINK="${{ secrets.WIN_CSC_LINK }}"
          [[ -n "${{ secrets.WIN_CSC_KEY_PASSWORD }}" ]] && export WIN_CSC_KEY_PASSWORD="${{ secrets.WIN_CSC_KEY_PASSWORD }}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --${{ matrix.platform }} --publish=always
          else
            npx electron-builder --${{ matrix.platform }} --publish=never
          fi

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MediScribe-${{ matrix.platform }}-installers
          retention-days: 7
          if-no-files-found: warn
          path: |
            dist-electron/*.exe
            dist-electron/*.msi
            dist-electron/*.dmg
            dist-electron/*.pkg
            dist-electron/*.zip
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.appx
            dist-electron/*.msix
            dist-electron/*.blockmap
            dist-electron/latest*.yml
