name: Build Multi-Platform Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Node setup with npm cache ───────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install Dependencies
        run: npm ci --ignore-scripts

      # ── 4. Prebuild Models and Binaries ────────────────────────────────────
      # This downloads Whisper models, Ollama, FFmpeg, etc.
      - name: Prebuild Bundling
        run: npm run prebuild

      # ── 5. Build Next.js ──────────────────────────────────────────────────
      - name: Build Next.js App
        run: npm run build
        env:
          NODE_ENV: production

      # ── 6. Build and Package Electron ──────────────────────────────────────
      # Note: For macOS notarization and MAS, the user needs to set up secrets:
      # APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID, CSC_LINK, CSC_KEY_PASSWORD
      - name: Build Electron App
        run: npx electron-builder --${{ matrix.platform }} --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS certificate and notarization secrets
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ── 7. Upload Artifacts ───────────────────────────────────────────────
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MediScribe-${{ matrix.platform }}-artifacts
          path: |
            dist-electron/*.exe
            dist-electron/*.appx
            dist-electron/*.dmg
            dist-electron/*.pkg
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.zip
          if-no-files-found: warn
          retention-days: 30
