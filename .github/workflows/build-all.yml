name: Build Multi-Platform Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Platform builds ───────────────────────────────────────────────────────
  build:
    name: Build for ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            target_platform: win32
          - os: macos-latest
            platform: mac
            target_platform: darwin
          - os: ubuntu-latest
            platform: linux
            target_platform: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install Dependencies
        run: npm ci

      # ── 4. Generate Platform Icons ────────────────────────────────────────
      - name: Generate Platform Icons
        run: node scripts/generate-icons.js

      # ── 5. Build Next.js ──────────────────────────────────────────────────
      - name: Build Next.js App
        run: npm run build --ignore-scripts

      # ── 6. Rebuild native modules for the current platform ─────────────────
      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      # ── 7. Bundle binaries (skip icon generation, already done above) ─────
      - name: Bundle Models and Binaries
        run: npm run prebuild
        env:
          TARGET_PLATFORM: ${{ matrix.target_platform }}
          SKIP_ICON_GENERATION: "true"

      # ── 8. Build and Package Electron ─────────────────────────────────────
      #    On a version tag: publish to GitHub Releases (enables auto-update)
      #    On branch push:   build only, no publish
      - name: Build Electron App
        run: |
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          [[ -n "${{ secrets.CSC_LINK }}" ]] && export CSC_LINK="${{ secrets.CSC_LINK }}"
          [[ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]] && export CSC_KEY_PASSWORD="${{ secrets.CSC_KEY_PASSWORD }}"
          [[ -n "${{ secrets.APPLE_ID }}" ]] && export APPLE_ID="${{ secrets.APPLE_ID }}"
          [[ -n "${{ secrets.APPLE_ID_PASSWORD }}" ]] && export APPLE_ID_PASSWORD="${{ secrets.APPLE_ID_PASSWORD }}"
          [[ -n "${{ secrets.APPLE_TEAM_ID }}" ]] && export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          [[ -n "${{ secrets.WIN_CSC_LINK }}" ]] && export WIN_CSC_LINK="${{ secrets.WIN_CSC_LINK }}"
          [[ -n "${{ secrets.WIN_CSC_KEY_PASSWORD }}" ]] && export WIN_CSC_KEY_PASSWORD="${{ secrets.WIN_CSC_KEY_PASSWORD }}"
          
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --${{ matrix.platform }} --publish=always
          else
            npx electron-builder --${{ matrix.platform }} --publish=never
          fi
        shell: bash

      # ── 9. Upload Artifacts ───────────────────────────────────────────────
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: MediScribe-${{ matrix.platform }}-artifacts
          path: |
            dist-electron/*.exe
            dist-electron/*.msi
            dist-electron/*.dmg
            dist-electron/*.pkg
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.zip
            dist-electron/*.appx
            dist-electron/*.msix
            dist-electron/*.blockmap
            dist-electron/latest*.yml
          if-no-files-found: warn
          retention-days: 30
