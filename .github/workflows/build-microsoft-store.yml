name: Build Windows (AppX + Installers)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      HAS_STORE_CREDS: ${{ secrets.PC_CLIENT_ID != '' && secrets.PC_CLIENT_SECRET != '' && secrets.PC_TENANT_ID != '' && secrets.PC_STORE_ID != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Write runtime secrets to .env so the packaged app can read them at runtime.
      # Without this step the packaged AppX has no OAuth credentials and Google login fails.
      - name: Write .env file
        shell: bash
        run: |
          printf '%s\n' \
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" \
            "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" \
            "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            > .env
          echo ".env written successfully."

      - name: Build application and bundle resources
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_PLATFORM: win32

      - name: Build AppX packages (x64 + arm64)
        run: npx electron-builder --win appx --x64 --arm64 --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows installers (NSIS + portable)
        run: npx electron-builder --win nsis portable --x64 --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppX artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: mediscribe-appx
          path: |
            dist-electron/*.appx
            dist-electron/*.appxupload
          if-no-files-found: error
          compression-level: 6
          retention-days: 1

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: mediscribe-windows-installers
          path: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
            dist-electron/latest.yml
          if-no-files-found: error
          compression-level: 6
          retention-days: 1

      - name: Publish to Microsoft Store
        if: env.HAS_STORE_CREDS == 'true'
        env:
          PC_CLIENT_ID: ${{ secrets.PC_CLIENT_ID }}
          PC_CLIENT_SECRET: ${{ secrets.PC_CLIENT_SECRET }}
          PC_TENANT_ID: ${{ secrets.PC_TENANT_ID }}
          PC_STORE_ID: ${{ secrets.PC_STORE_ID }}
        run: |
          Write-Host "Locating .appx in dist-electron..."
          $appx = Get-ChildItem "dist-electron\*.appx" | Select-Object -First 1 | ForEach-Object { $_.FullName }
          if (-not $appx) {
            Write-Error "No .appx found in dist-electron/ — skipping publish."
            exit 1
          }
          Write-Host "Using AppX: $appx"
          node scripts/publish-msstore.js "$appx"
        shell: pwsh
