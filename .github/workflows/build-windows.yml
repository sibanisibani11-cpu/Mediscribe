name: Build Windows AppX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Build AppX (${{ matrix.arch }})
    runs-on: windows-latest
    env:
      HAS_STORE_CREDS: ${{ secrets.PC_CLIENT_ID != '' && secrets.PC_CLIENT_SECRET != '' && secrets.PC_TENANT_ID != '' && secrets.PC_STORE_ID != '' }}
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Write runtime secrets to .env so the packaged app can read Google OAuth credentials.
      - name: Write .env file
        shell: bash
        run: |
          if [[ -z "${{ secrets.GOOGLE_CLIENT_ID }}" || -z "${{ secrets.GOOGLE_CLIENT_SECRET }}" ]]; then
            echo "::error::GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET repo secrets are not set — the built app would ship without Google Sync credentials. Add them in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s\n' \
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" \
            "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" \
            "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            > .env
          echo ".env written successfully."

      # NEXT_PUBLIC_* vars are inlined at build time by Next.js — they MUST be present
      # here as env vars (the .env file alone is fragile since prebuild can rewrite it).
      - name: Build web app (Next.js)
        shell: bash
        run: |
          if [[ -z "$NEXT_PUBLIC_FIREBASE_API_KEY" ]]; then
            echo "::error::NEXT_PUBLIC_FIREBASE_* repo secrets are not set. Without them the app ships in 'simulated mode' with per-machine (not per-user) licensing, letting any account on an activated machine use Pro for free. Add them in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

      - name: Bundle models and binaries
        run: npm run prebuild
        env:
          TARGET_PLATFORM: win32
          SKIP_ICON_GENERATION: 'true'

      - name: Package Electron app (AppX)
        run: npx electron-builder --win appx --${{ matrix.arch }} --publish=never

      - name: Upload AppX artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: MediScribe-AppX-${{ matrix.arch }}
          path: dist-electron/*.appx
          compression-level: 6
          retention-days: 1

      - name: Publish to Microsoft Store
        if: env.HAS_STORE_CREDS == 'true'
        shell: bash
        env:
          PC_TENANT_ID: ${{ secrets.PC_TENANT_ID }}
          PC_CLIENT_ID: ${{ secrets.PC_CLIENT_ID }}
          PC_CLIENT_SECRET: ${{ secrets.PC_CLIENT_SECRET }}
          PC_STORE_ID: ${{ secrets.PC_STORE_ID }}
        run: |
          APPX=$(ls dist-electron/*.appx | head -n1)
          echo "Using AppX: $APPX"
          node scripts/publish-msstore.js "$APPX"
